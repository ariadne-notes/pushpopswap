# Lychee link-checker config. The wrapper passes this file explicitly. Run with:
#   ./scripts/lychee-link-check/check-links-with-lychee.sh

# Reuse checks for two days from the on-disk cache.
cache = true
max_cache_age = "2d"
# Cache successful checks only. Failures should be freshly tested on a later
# run rather than replayed instantly from the cache.
cache_exclude_status = ["400..=599", "999"]

# A failed URL will be retried on a later run. Avoid a long quiet tail caused
# by retrying slow hosts up to three times during the same run.
timeout = 5
max_retries = 0

# Send only one request at a time to each host, with at least one second between
# requests. Different hosts can all be checked concurrently.
host_concurrency = 1
host_request_interval = "1s"

# Pretend to be a browser so fewer sites reject the request outright.
user_agent = "Mozilla/5.0 (compatible; lychee link checker)"

# Don't fail on links lychee can't resolve from source but that work
# in the built mdBook (e.g. .html targets with query strings/anchors).
exclude = [
  '\.html\?',
]
