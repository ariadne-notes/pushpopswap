# Lychee link-checker config. The wrapper passes this file explicitly. Run with:
#   ./scripts/lychee-link-check/check-links-with-lychee.sh
# To check a smaller, stable slice of files:
#   ./scripts/lychee-link-check/check-links-with-lychee.sh --batch 1/10

# Quiet output and reuse the on-disk cache (.lycheecache).
no_progress = true
cache = true

# Pretend to be a browser so fewer sites reject the request outright.
user_agent = "Mozilla/5.0 (compatible; lychee link checker)"

# Don't fail on links lychee can't resolve from source but that work
# in the built mdBook (e.g. .html targets with query strings/anchors).
exclude = [
  '\.html\?',
]

# Cisco rate-limits automated checks. Serialize requests to its hosts and leave
# a gap between them; 403 and 429 responses remain visible as failures.
[hosts."www.cisco.com"]
concurrency = 1
request_interval = "1s"

[hosts."community.cisco.com"]
concurrency = 1
request_interval = "1s"

[hosts."learningnetwork.cisco.com"]
concurrency = 1
request_interval = "1s"
