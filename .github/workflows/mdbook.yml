name: Deploy mdBook site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BOOK: 0.5.3
      MER: 0.17.0
      BOB: 0.3.0
      INFO: 2.0.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-mdbook-${{ env.BOOK }}-mermaid-${{ env.MER }}-svgbob-${{ env.BOB }}-gitinfo-${{ env.INFO }}
      - name: Install mdBook
        run: |
          which mdbook || cargo install --version ${{ env.BOOK }} mdbook
          which mdbook-mermaid || cargo install --version ${{ env.MER }} mdbook-mermaid
          which mdbook-svgbob || cargo install --version ${{ env.BOB }} mdbook-svgbob
          which mdbook-gitinfo || cargo install --version ${{ env.INFO }} mdbook-gitinfo
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with mdBook
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
