name: Deploy mdBook site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Touched-page URLs (computed from this push's git diff) handed to the
    # IndexNow job, which submits exactly these after deploy.
    outputs:
      changed_urls: ${{ steps.changed.outputs.urls }}
    env:
      BOOK: 0.5.3
      MER: 0.17.0
      INFO: 2.0.0
      BOB: 0.3.0
    
    steps:
    
      #
      # This follows a build and cache method.
      #
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache mdbook
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: mdbook-${{ runner.os }}-${{ env.BOOK }}
          
      - name: Install mdbook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@${{ env.BOOK }}

      - name: Cache mdbook-mermaid
        id: cache-mermaid
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-mermaid
          key: mdbook-mermaid-${{ runner.os }}-${{ env.MER }}
          
      - name: Install mdbook-mermaid
        if: steps.cache-mermaid.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook-mermaid@${{ env.MER }}

      - name: Cache mdbook-gitinfo
        id: cache-gitinfo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-gitinfo
          key: mdbook-gitinfo-${{ runner.os }}-${{ env.INFO }}
          
      - name: Install mdbook-gitinfo
        if: steps.cache-gitinfo.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook-gitinfo@${{ env.INFO }}

      - name: Cache mdbook-svgbob
        id: cache-svgbob
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-svgbob
          key: mdbook-svgbob-${{ runner.os }}-${{ env.BOB }}
          
      - name: Install mdbook-svgbob
        if: steps.cache-svgbob.outputs.cache-hit != 'true'
        run: cargo install --version ${{ env.BOB }} --locked mdbook-svgbob

      - name: Install mdbook-summary-h1
        run: cargo install --git https://github.com/ariadne-notes/mdbook-summary-h1 --locked mdbook-summary-h1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Build with mdBook
        run: mdbook build

      - name: Stamp page mtimes from git (for per-page <lastmod>)
        run: scripts/sitemap/stamp-page-mtimes.sh

      - name: Generate sitemap
        run: |
          npx static-sitemap-cli \
            --base https://pushpopswap.com \
            --root book \
            --no-clean \
            --format xml

      # IndexNow ownership file. The key lives only in the encrypted secret;
      # it is never committed. We write it into the built site so it is served
      # at https://pushpopswap.com/<key>.txt for engines to verify. Done after
      # sitemap generation so the .txt is never pulled into the sitemap.
      - name: Write IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [[ -z "$INDEXNOW_KEY" ]]; then
            echo "error: INDEXNOW_KEY secret is not set" >&2
            exit 1
          fi
          printf '%s' "$INDEXNOW_KEY" > "book/${INDEXNOW_KEY}.txt"

      # Map the source files this push changed to their built page URLs. The
      # script writes the list to this step's `urls` output.
      - name: Compute touched page URLs for IndexNow
        id: changed
        run: scripts/indexnow/changed-urls.sh "${{ github.event.before }}" "${{ github.sha }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # IndexNow: a separate job so a slow or failed submission never affects the
  # deploy job's status or the github-pages environment. Runs after deploy so
  # the submitted pages and the ownership file (book/<key>.txt) are live.
  #
  # Submits exactly the pages this push touched (computed in the build job from
  # the git diff) -- nudging Bing, Yandex, Seznam, Naver via api.indexnow.org.
  # Google does NOT use IndexNow -- for Google, rely on Search Console.
  #
  # Skipped entirely when the push changed no published pages.
  indexnow:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ needs.build.outputs.changed_urls != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Submit touched URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          CHANGED_URLS: ${{ needs.build.outputs.changed_urls }}
        run: printf '%s' "$CHANGED_URLS" | scripts/indexnow/submit.sh
