[book]
title = "Push, Pop, Swap"
description = "Ariadne's Network Studying notes."
authors = ["Ariadne"]
language = "en"

[preprocessor.svgbob]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.gitinfo]
enable      = true
hyperlink   = true
date-format = "%A, %B %e, %Y."
time-format = "%l:%M %P UTC%Z"

[preprocessor.gitinfo.message]
footer = "Last Modified{{sep}}{{date}}{{sep}}Commit: {{hash}}"

[preprocessor.qualify-title]
command = "python3 scripts/qualify-title/qualify_title.py"

[output.html.fold]
enable = true
level = 0

[output.html.playground]
editable = true
copy-js = true

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
mathjax-support = true
additional-css = ["theme/custom.css","theme/mermaid-lightbox.css"]
additional-js = ["theme/svg-pan-zoom.min.js","theme/mermaid-lightbox.js","theme/mermaid-lazyload.js","theme/editable-extras.js"]
git-repository-url = "https://github.com/ariadne-notes/pushpopswap"
