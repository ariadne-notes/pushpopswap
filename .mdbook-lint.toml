disabled-rules = ["MD012", "MD013","MD033","MD044","MD049","MD052"]
# MD012 - multiple consecutive blank lines, Ascii art
# MD013 - 80 character line length
# MD033 - HTML Tags being used ... <pre> for ASCII art
# MD044 - Proper Names Capitalization, off because of "ip" inside of code blocks
# MD049 - Emphasis style, false positives from underscores in identifiers (e.g. MULTI_EXIT_DISC)
# MD052 - Reference link undefined, false positives from JS bracket syntax in eigrp calculator pages

[[overrides]]
path = "eigrp-classic-metric.md"
disabled_rules = ["MD052"]

[[overrides]]
path = "eigrp-metric-wide.md"
disabled_rules = ["MD052"]
